# -----------------------------------------------------------------------------
# KOALA Lab — Knowledge of Optimization and Learning Algorithms
# Georgia Institute of Technology
# -----------------------------------------------------------------------------

title: KOALA Lab
description: >
  The KOALA (Knowledge of Optimization and Learning Algorithms) Lab at Georgia Tech,
  led by Professor Kai Wang. We develop AI, machine learning, and optimization solutions
  for social impact in health, conservation, and sustainability.
footer_text: >
  © KOALA Lab, Georgia Institute of Technology.
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with
  <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.
keywords: >
  optimization, machine learning, reinforcement learning, restless bandits,
  decision-focused learning, game theory, social impact, Georgia Tech, KOALA lab
lang: en
icon: 🐨

url: https://gt-koala.github.io
baseurl: ""
last_updated: true
back_to_top: true

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------
repo_theme_light: default
repo_theme_dark: dark
repo_trophies:
  enabled: false

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------
navbar_fixed: true
footer_fixed: true
search_enabled: true
socials_in_search: false
posts_in_search: true
bib_search: true
max_width: 960px

# -----------------------------------------------------------------------------
# Open Graph
# -----------------------------------------------------------------------------
serve_og_meta: true
serve_schema_org: false

# -----------------------------------------------------------------------------
# Analytics
# -----------------------------------------------------------------------------
google_analytics:
enable_google_analytics: false
enable_google_verification: false
enable_bing_verification: false
enable_cookie_consent: false

# -----------------------------------------------------------------------------
# Blog / News
# -----------------------------------------------------------------------------
blog_name: KOALA Lab News
blog_description: Updates from the KOALA Lab at Georgia Tech
permalink: /news/:year/:title/
lsi: false
pagination:
  enabled: true
related_blog_posts:
  enabled: false

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------
collections:
  news:
    defaults:
      layout: post
    output: true
  projects:
    output: true
  teachings:
    output: true

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

include: ["_pages", "_scripts"]
exclude:
  - bin/
  - CONTRIBUTING.md
  - CUSTOMIZE.md
  - Dockerfile
  - docker-compose.yml
  - docker-compose-slim.yml
  - FAQ.md
  - Gemfile
  - Gemfile.lock
  - INSTALL.md
  - LICENSE
  - lighthouse_results/
  - package.json
  - package-lock.json
  - purgecss.config.js
  - README.md
  - readme_preview/
  - vendor
keep_files:
  - CNAME
  - .nojekyll

plugins:
  - jekyll-3rd-party-libraries
  - jekyll-archives-v2
  - jekyll-cache-bust
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll-regex-replace
  - jekyll/scholar
  - jekyll-sitemap
  - jekyll-socials
  - jekyll-tabs
  - jekyll-terser
  - jekyll-toc
  - jemoji

defaults:
  - scope:
      path: "assets"
    values:
      sitemap: false

sass:
  style: compressed

jekyll-minifier:
  compress_javascript: false
  exclude: ["robots.txt", "assets/js/search/*.js"]

terser:
  compress:
    drop_console: true

jekyll-archives:
  posts:
    enabled: [year, tags, categories]
    permalinks:
      year: "/news/:year/"
      tags: "/news/:type/:name/"
      categories: "/news/:type/:name/"

display_tags: []
display_categories: []

# -----------------------------------------------------------------------------
# Jekyll Scholar — highlights Kai Wang's name in publication lists
# -----------------------------------------------------------------------------
scholar:
  last_name: [Wang]
  first_name: [Kai, K.]

  style: apa
  locale: en

  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  bibtex_filters: [latex, smallcaps, superscript]

  replace_strings: true
  join_strings: true

  details_dir: bibliography
  details_link: Details

  query: "@*"
  group_by: year
  group_order: descending

enable_publication_badges:
  altmetric: false
  dimensions: true
  google_scholar: true
  inspirehep: false

filtered_bibtex_keywords:
  [abbr, abstract, additional_info, altmetric, annotation, arxiv, award,
   award_name, bibtex_show, blog, code, dimensions, eprint, google_scholar_id,
   html, pdf, poster, preview, selected, slides, supp, video, website]

max_author_limit: 5
more_authors_animation_delay: 10
enable_publication_thumbnails: false

# -----------------------------------------------------------------------------
# Optional Features
# -----------------------------------------------------------------------------
enable_masonry: true
enable_math: true
enable_tooltips: false
enable_darkmode: true
enable_navbar_social: true
enable_project_categories: true
enable_medium_zoom: true
enable_progressbar: true
enable_video_embedding: false

external_links:
  enabled: true
  rel: external nofollow noopener
  target: _blank

imagemagick:
  enabled: false

lazy_loading_images: true

jekyll_get_json:
  - data: resume
    json: assets/json/resume.json

jsonresume:
  - basics
  - work
  - education
  - publications
  - projects
  - awards

